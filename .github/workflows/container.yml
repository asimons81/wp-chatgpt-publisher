name: Container

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      ref:
        description: Release tag to publish
        required: true
        default: v1.0.2

permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write

concurrency:
  group: container-${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.event.release.tag_name }}
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  publish:
    name: Publish container image
    runs-on: ubuntu-latest
    steps:
      - name: Check out release source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.event.release.tag_name }}

      - name: Validate release version
        id: version
        shell: bash
        env:
          RELEASE_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.event.release.tag_name }}
        run: |
          if [[ ! "$RELEASE_REF" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release ref must be a stable semantic version tag (vX.Y.Z)." >&2
            exit 1
          fi
          VERSION="${RELEASE_REF#v}"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          if [[ "$VERSION" != "$PACKAGE_VERSION" ]]; then
            echo "Tag $VERSION does not match package version $PACKAGE_VERSION." >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: metadata
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=latest
            type=sha,format=long
          labels: |
            org.opencontainers.image.title=Editorial Publisher for ChatGPT
            org.opencontainers.image.description=Open-source ChatGPT app for secure WordPress editorial workflows
            org.opencontainers.image.licenses=GPL-2.0-or-later
            org.opencontainers.image.version=${{ steps.version.outputs.version }}

      - name: Build and publish image
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Attest published image
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4
        with:
          subject-name: ${{ env.IMAGE }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
